# Alembic configuration — GHG Accounting Tool
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = alembic
prepend_sys_path = .

# SQLAlchemy URL — override in production via env var SQLALCHEMY_URL
# Format: postgresql+psycopg://<user>:<password>@<host>:<port>/<dbname>
sqlalchemy.url = postgresql+psycopg://ghg_app:changeme@localhost:5432/ghg_tool

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
