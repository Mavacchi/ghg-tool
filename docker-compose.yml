---
# GHG Tool — Docker Compose (local development + integration test stack)
#
# Services:
#   db             — PostgreSQL 15 with ghg_tool database
#   redis          — Redis 7 broker + result backend for Celery (REV-WAVE3-007)
#   migrate        — one-shot Alembic upgrade (depends on db healthcheck)
#   app            — FastAPI (uvicorn) [wave 3; placeholder command]
#   celery-worker  — Celery worker for PDF/Excel export tasks (REV-WAVE3-007)
#   etl            — ETL orchestrator CLI [wave 3; placeholder command]
#
# Usage:
#   docker compose up db redis migrate              # start infra services
#   docker compose up                               # full stack
#   docker compose --profile app up                 # app + worker bundle
#   docker compose down -v                          # stop + remove volumes

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: ghg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghg_tool
      POSTGRES_USER: ghg_app
      # SEC-P0: no hardcoded default — POSTGRES_PASSWORD MUST be set in the
      # caller's .env or shell environment.  Compose will refuse to start
      # without it. See .env.example.
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghg_app -d ghg_tool"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


  # ---------------------------------------------------------------------------
  # Redis 7 -- SEC-P1-007 token blacklist + SEC-ADV-008 rate-limiter storage.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ghg_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Redis 7 — Celery broker (db 1) + result backend (db 2) — REV-WAVE3-007
  # Also available for future rate-limiter (SEC-ADV-008) and token blacklist
  # (SEC-P1-007) without an additional service.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ghg_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Alembic migrations (run-once on every docker compose up)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      target: runtime
    container_name: ghg_migrate
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SQLALCHEMY_URL: "postgresql+psycopg://ghg_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}@db:5432/ghg_tool"
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Application server (wave 3 — placeholder)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      target: runtime
    container_name: ghg_app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SQLALCHEMY_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}@db:5432/ghg_tool"
      DATABASE_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}@db:5432/ghg_tool"
      GHG_LOG_LEVEL: "${GHG_LOG_LEVEL:-INFO}"
      # Production-safe defaults: no demo seed, no /docs Swagger UI.
      # Override with docker-compose.quickstart.yml for the
      # demo onboarding flow (preloaded data + demo/demo login).
      GHG_ENVIRONMENT: "${GHG_ENVIRONMENT:-production}"
      # GHG_JWT_SECRET MUST be set (>= 32 chars) when GHG_ENVIRONMENT is
      # production/staging.  start.bat auto-generates a fresh secret into
      # .env on first launch; for production deploys provide your own.
      GHG_JWT_SECRET: "${GHG_JWT_SECRET}"
      GHG_CORS_ORIGINS: "${GHG_CORS_ORIGINS:-http://localhost:8501}"
      # Bootstrap admin persistence — all three must be set together.
      # Leave empty (default) to skip bootstrap.
      GHG_BOOTSTRAP_ADMIN_USERNAME: "${GHG_BOOTSTRAP_ADMIN_USERNAME:-}"
      GHG_BOOTSTRAP_ADMIN_EMAIL: "${GHG_BOOTSTRAP_ADMIN_EMAIL:-}"
      GHG_BOOTSTRAP_ADMIN_PASSWORD_HASH: "${GHG_BOOTSTRAP_ADMIN_PASSWORD_HASH:-}"
      # SEC-P1-007 + SEC-ADV-008: shared Redis URL for blacklist + rate limit.
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
    ports:
      - "8000:8000"
    restart: unless-stopped
    profiles:
      - app  # only started when: docker compose --profile app up

  # ---------------------------------------------------------------------------
  # Celery worker — PDF / Excel export background tasks (REV-WAVE3-007)
  # Concurrency 2: each worker slot can hold one WeasyPrint + one openpyxl
  # render simultaneously.  Increase --concurrency for more parallel exports.
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      target: runtime
    container_name: ghg_celery_worker
    command: >
      celery -A ghg_tool.infrastructure.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      SQLALCHEMY_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}@db:5432/ghg_tool"
      DATABASE_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}@db:5432/ghg_tool"
      GHG_LOG_LEVEL: "${GHG_LOG_LEVEL:-INFO}"
      GHG_ENVIRONMENT: "${GHG_ENVIRONMENT:-production}"
      GHG_JWT_SECRET: "${GHG_JWT_SECRET}"
    restart: unless-stopped
    profiles:
      - app  # started together with the app bundle

  # ---------------------------------------------------------------------------
  # Streamlit dashboard — production-safe defaults (no demo seed, no banner).
  # The quickstart override (docker-compose.quickstart.yml) adds
  # GHG_DEMO_MODE=true on top of this base when the demo experience is wanted.
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: .
      target: runtime
    container_name: ghg_streamlit
    depends_on:
      app:
        condition: service_started
    environment:
      GHG_API_BASE_URL: "http://app:8000"
      GHG_ENVIRONMENT: "${GHG_ENVIRONMENT:-production}"
      GHG_LOG_LEVEL: "${GHG_LOG_LEVEL:-INFO}"
    command:
      - "python"
      - "-m"
      - "streamlit"
      - "run"
      - "--server.address=0.0.0.0"
      - "--server.port=8501"
      - "--browser.gatherUsageStats=false"
      - "--server.fileWatcherType=none"
      - "/usr/local/lib/python3.11/site-packages/ghg_tool/ui/streamlit_app/Home.py"
    ports:
      - "8501:8501"
    restart: unless-stopped
    profiles:
      - app  # streamlit is part of the 'app' bundle

  # ---------------------------------------------------------------------------
  # ETL CLI (wave 3 — placeholder)
  # ---------------------------------------------------------------------------
  etl:
    build:
      context: .
      target: runtime
    container_name: ghg_etl
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      SQLALCHEMY_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (set via .env)}@db:5432/ghg_tool"
    volumes:
      - ./data:/app/data:ro
    # Override this command with the actual ETL entrypoint in wave 3
    command: ["python", "-m", "ghg_tool.etl.orchestrator", "--help"]
    profiles:
      - etl  # only started when: docker compose --profile etl up

volumes:
  pgdata:
    name: ghg_pgdata
  redisdata:
    name: ghg_redisdata
