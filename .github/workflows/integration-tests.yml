---
# GHG Tool -- Testcontainers-backed PostgreSQL integration test suite
# Wave-4 item #11: real-Postgres tier for trigger, RLS, migration, and
# decimal-precision tests.
#
# Design: testcontainers-python spins the PostgreSQL 15 container inside
# the runner process rather than relying on a GitHub Actions services:
# block.  Benefits:
#
#   1. Identical invocation locally and in CI -- `pytest -m integration`
#      works on a developer laptop with Docker Desktop just as it does here.
#   2. Alembic applies its migrations against the exact container it created,
#      eliminating the GHA healthcheck / wait loop boilerplate.
#   3. No YAML drift between the services: postgres block and the DSN passed
#      to the test process -- testcontainers fills in host, port, and
#      credentials automatically.
#
# No secrets are required by this workflow: all DB credentials are
# ephemeral throwaway values generated by testcontainers.

name: Integration tests (testcontainers)

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Postgres integration suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests via testcontainers
        # testcontainers pulls postgres:15-alpine and manages the container
        # lifecycle within the pytest session.  No external Docker Compose
        # stack or GHA services: block is needed.
        #
        # --maxfail=3: abort after 3 failures to keep CI feedback fast.
        # -m integration: opt-in marker; default pytest run excludes these.
        # --cov-fail-under=0: integration coverage is measured separately
        #   from the unit-test 85% gate (see ci.yml).
        env:
          # Ensure the JWT middleware does not reject startup during API stubs
          JWT_SECRET_KEY: "test-secret-only-for-ci-min-32-characters-long"
          ENV: "test"
        run: |
          pytest -m integration -v --tb=short --maxfail=3 \
            --cov=src/ghg_tool \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            tests/integration/postgres/

      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-postgres
          path: .coverage
