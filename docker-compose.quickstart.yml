---
# GHG Tool — Quickstart override (demo mode ON).
#
# Usage (Windows): double-click start-demo.bat
# Usage (manual):
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.quickstart.yml \
#                  --profile app up -d --build
#
# This override layers DEMO env vars on top of the production-safe base
# docker-compose.yml.  It does NOT redefine the `app` or `streamlit`
# services — the base file already does, with `GHG_ENVIRONMENT=production`
# as default.  Here we flip the relevant env vars so the demo seed runs,
# the demo/demo login is enabled, and the sticky DEMO banner is shown.
#
# DO NOT use this file in production.  See docs/deployment.md for the
# production runbook with real secrets, TLS, and Redis rate-limiter.

services:
  app:
    environment:
      SQLALCHEMY_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:-changeme}@db:5432/ghg_tool"
      SQLALCHEMY_ASYNC_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:-changeme}@db:5432/ghg_tool"
      DATABASE_URL: "postgresql+asyncpg://ghg_app:${POSTGRES_PASSWORD:-changeme}@db:5432/ghg_tool"
      GHG_JWT_SECRET: "quickstart-only-jwt-secret-min-32-chars-not-prod"
      GHG_ENVIRONMENT: "development"
      GHG_DEMO_MODE: "true"
      GHG_CORS_ORIGINS: "http://localhost:8501"
      GHG_LOG_LEVEL: "INFO"

  streamlit:
    environment:
      GHG_API_BASE_URL: "http://app:8000"
      GHG_ENVIRONMENT: "development"
      GHG_DEMO_MODE: "true"
      GHG_LOG_LEVEL: "INFO"
